# ── Landing page ───────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name docs.internal;
    root /usr/share/nginx/html/landing;
    index index.html;
    server_tokens off;
}

# ── Kubernetes docs ────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name kubernetes.docs.internal;
    root /usr/share/nginx/html/kubernetes;
    index index.html;

    # ── sub_filter backstop ───────────────────────────────────────────────────
    # Rewrites any residual kubernetes.io references in files nginx serves.
    # This catches literal strings in HTML and JS — it cannot catch URLs that
    # JavaScript constructs dynamically at runtime (e.g. string concatenation).
    # The Hugo build changes above handle those at the source.
    #
    # sub_filter requires the response to NOT be gzip-encoded at this point,
    # so we decompress before filtering, then re-compress.
    sub_filter_once off;
    sub_filter_types text/html text/javascript application/javascript text/css;
    sub_filter 'https://kubernetes.io' 'http://kubernetes.docs.internal';
    sub_filter 'http://kubernetes.io'  'http://kubernetes.docs.internal';

    # Re-enable compression after filtering
    gzip on;
    gzip_types text/html text/javascript application/javascript text/css;

    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    # Offline Lunr search index — generated by Hugo at build time
    # Lives at /offline-search-index.xxx.json — short cache since it's versioned
    location ~* offline-search-index {
        expires 1d;
        add_header Cache-Control "public";
    }

    location ~* \.(css|js|woff2?|png|jpg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    include mime.types;
    types { application/javascript mjs; }

    autoindex    off;
    server_tokens off;
}

