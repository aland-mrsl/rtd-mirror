# ── Docker Build + Bake docs ───────────────────────────────────────────────────
server {
    listen 80;
    server_name docker-build.docs.internal;
    root /usr/share/nginx/html/docker-build;
    index index.html;

    location = / {
        return 301 /build/;
    }

    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    location /_next/static/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    include mime.types;
    types { application/javascript mjs; }

    autoindex    off;
    server_tokens off;
}