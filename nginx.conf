# ── Valkey docs (main site) ───────────────────────────────────────────────────
server {
    listen 80;
    server_name valkey.docs.internal;
    root /usr/share/nginx/html/valkey;
    index index.html;

    # Rewrite any residual valkey.io references that survived the Zola base-url
    # override (e.g. banner links, blog cross-references).
    sub_filter_once off;
    sub_filter_types text/html text/javascript application/javascript text/css;
    sub_filter 'https://valkey.io' 'http://valkey.docs.internal';
    sub_filter 'http://valkey.io'  'http://valkey.docs.internal';

    gzip on;
    gzip_types text/html text/javascript application/javascript text/css;

    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    location ~* \.(css|js|woff2?|png|jpg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    include mime.types;
    types { application/javascript mjs; }

    autoindex    off;
    server_tokens off;
}

